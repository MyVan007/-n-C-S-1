<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Thống Kê</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="index.html">

            <i class="fa-solid fa-list-check"></i>
            Quản Lý Công Việc

        </a>

    </div>

</nav>

<section class="statistics-page">

    <div class="container">

        <h2 class="text-center text-primary fw-bold mb-5">

            <i class="fa-solid fa-chart-column"></i>
            Thống Kê Công Việc

        </h2>

        <div class="row g-4">

            <div class="col-md-4">

                <div class="stat-card bg-primary text-white">

                    <i class="fa-solid fa-list fa-2x mb-3"></i>

                    <h5>Tổng Công Việc</h5>

                    <h1 id="totalTask">0</h1>

                </div>

            </div>

            <div class="col-md-4">

                <div class="stat-card bg-success text-white">

                    <i class="fa-solid fa-circle-check fa-2x mb-3"></i>

                    <h5>Hoàn Thành</h5>

                    <h1 id="completedTask">0</h1>

                </div>

            </div>

            <div class="col-md-4">

                <div class="stat-card bg-warning text-dark">

                    <i class="fa-solid fa-clock fa-2x mb-3"></i>

                    <h5>Đang Thực Hiện</h5>

                    <h1 id="pendingTask">0</h1>

                </div>

            </div>

        </div>

    </div>

</section>
<script>

    const tasks =
        JSON.parse(localStorage.getItem("tasks")) || [];

    const completed =
        tasks.filter(task => task.completed);

    document.getElementById("totalTask").innerText =
        tasks.length;

    document.getElementById("completedTask").innerText =
        completed.length;

    document.getElementById("pendingTask").innerText =
        tasks.length - completed.length;

</script>

</body>
</html>
